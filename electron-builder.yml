appId: com.altproxy.control-center
productName: AltProxy
copyright: Copyright (c) 2026 AltProxy

directories:
  output: release
  buildResources: build

files:
  - dist/**
  - dist-electron/**
  - package.json

extraMetadata:
  main: dist-electron/main.js

win:
  requestedExecutionLevel: requireAdministrator
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: AltProxy

extraResources:
  - from: reference
    to: reference
  - from: build/icon.ico
    to: icon.ico
